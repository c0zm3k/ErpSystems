{% extends "base.html" %}

{% block title %}Add Staff Member - College ERP{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="bg-indigo-50 rounded-lg p-6 border-l-4 border-indigo-600">
        <h1 class="text-3xl font-bold text-gray-800">Add Staff Member</h1>
        <p class="text-gray-600 mt-2">Add a new staff member to the system</p>
    </div>

    <div class="max-w-2xl">
        <div class="bg-white rounded-lg shadow-md p-8">
            <form method="POST" class="space-y-6">
                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">
                        Full Name <span class="text-red-600">*</span>
                    </label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Designation -->
                <div>
                    <label for="designation" class="block text-sm font-semibold text-gray-700 mb-2">
                        Designation <span class="text-red-600">*</span>
                    </label>
                    <input type="text" id="designation" name="designation" required
                           placeholder="e.g., Receptionist, Accountant"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Department -->
                <div>
                    <label for="department" class="block text-sm font-semibold text-gray-700 mb-2">
                        Department <span class="text-red-600">*</span>
                    </label>
                    <input type="text" id="department" name="department" required
                           placeholder="e.g., Administration, Finance"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                        Email (optional)
                    </label>
                    <input type="email" id="email" name="email"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">
                        Phone (optional)
                    </label>
                    <input type="tel" id="phone" name="phone"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Office -->
                <div>
                    <label for="office" class="block text-sm font-semibold text-gray-700 mb-2">
                        Office Location (optional)
                    </label>
                    <input type="text" id="office" name="office"
                           placeholder="e.g., Block A, Room 101"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>

                <!-- Buttons -->
                <div class="flex gap-4">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-8 rounded-lg transition">
                        <i class="fas fa-plus mr-2"></i>Add Staff Member
                    </button>
                    <a href="{{ url_for('admin.manage_staff') }}" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-8 rounded-lg transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
